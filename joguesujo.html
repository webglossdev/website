<head>

    <link rel="stylesheet" href="https://assets.guns.lol/fonts/X6XYTKIVDUW7GZTZPZNN4EUM5KH54KHF.css">

    <style>
        :root {
            --primary-glow: rgba(161, 62, 207, 0.6);
            --card-bg: rgba(0, 0, 0, 0.25);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent-color: #a13ecf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Satoshi', sans-serif;
            background-color: #0a0a0a;
            color: var(--text-color);
            cursor: url('https://r2.guns.lol/e081a809-18d9-4eed-bafb-21970d405b70.png') 8 8, auto;
        }

        a,
        button {
            cursor: url('https://r2.guns.lol/e081a809-18d9-4eed-bafb-21970d405b70.png') 8 8, pointer;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.55;
            filter: brightness(0.4) contrast(1.1);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: -2;
            pointer-events: none;
        }

        /* Snow Particles Canvas/Container */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .snowflake {
            position: absolute;
            color: #fff;
            font-size: 1em;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0.85;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
            }

            100% {
                transform: translateY(105vh) rotate(360deg);
            }
        }

        @keyframes drift {

            0%,
            100% {
                transform: translateX(0px);
            }

            50% {
                transform: translateX(35px);
            }
        }

        /* Entry Overlay */
        .entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .entry-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .entry-text {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            animation: pulse 1.8s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
                text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            }
        }

        /* Main View Wrapper */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            perspective: 1000px;
        }

        /* Profile Card */
        .profile-card {
            width: 100%;
            max-width: 640px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        @keyframes cardAppear {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Avatar Section */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-img {
            width: 106px;
            height: 106px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        .avatar-decoration {
            position: absolute;
            width: 136.8px;
            height: 136.8px;
            top: -3px;
            left: -3px;
            pointer-events: none;
            z-index: 3;
        }

        /* Username & Badges */
        .name-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .username {
            font-size: 38px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
            background-image: url('https://assets.guns.lol/sparkle_white.gif');
            background-clip: text;
            -webkit-background-clip: text;
            text-shadow: 0 0 18px rgba(255, 255, 255, 0.7);
            position: relative;
        }

        .badges-wrapper {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .badge-icon {
            width: 18px;
            height: 18px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .badge-icon svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.4));
        }

        .badge-tooltip {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: rgba(10, 10, 10, 0.95);
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .badge-icon:hover .badge-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Bio */
        .bio-subtitle {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 25px;
            letter-spacing: 0.2px;
        }

        /* Discord Presence Widget */
        .discord-widget {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .discord-widget:hover {
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .discord-avatar-wrapper {
            position: relative;
            width: 64px;
            height: 64px;
        }

        .discord-widget-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
        }

        .discord-status-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url('https://assets.guns.lol/dnd.png');
            background-size: cover;
            border: 3px solid rgba(24, 25, 28, 1);
        }

        .discord-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
        }

        .discord-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .discord-username {
            font-weight: 700;
            font-size: 15px;
            color: #ffffff;
        }

        .discord-clan-tag {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .discord-clan-tag img {
            width: 12px;
            height: 12px;
        }

        .discord-presence-status {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .discord-presence-game {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .discord-presence-game img {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        /* Social Icons Grid */
        .socials-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 480px;
            margin-bottom: 35px;
        }

        .social-link {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .social-link svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            transition: fill 0.3s ease;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.15);
            filter: drop-shadow(#ffffff 0px 0px 8px);
        }

        /* Custom Music Player */
        .music-player {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 25px;
        }

        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .track-details {
            display: flex;
            flex-direction: column;
        }

        .track-name {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
        }

        .track-artist {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player-btn {
            background: none;
            border: none;
            color: #ffffff;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player-btn svg {
            width: 16px;
            height: 16px;
            fill: #ffffff;
        }

        .player-btn.play-pause-btn {
            opacity: 1;
            background: rgba(255, 255, 255, 0.08);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .player-btn.play-pause-btn svg {
            width: 14px;
            height: 14px;
        }

        .player-btn:hover {
            opacity: 1;
            transform: scale(1.08);
        }

        /* Progress Bar & Timing */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-label {
            font-size: 11px;
            color: var(--text-muted);
            width: 32px;
            text-align: center;
        }

        .progress-slider-wrapper {
            flex-grow: 1;
            position: relative;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            background: #ffffff;
            border-radius: 2px;
            width: 0%;
            position: relative;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        .progress-handle {
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
            display: none;
        }

        .progress-slider-wrapper:hover .progress-handle {
            display: block;
        }

        /* Views Badge (Top Right of Card) */
        .views-container {
            position: absolute;
            top: 15px;
            right: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 4px 8px;
            border-radius: 20px;
        }

        .views-container svg {
            width: 13px;
            height: 13px;
            fill: var(--text-muted);
        }
    </style>
</head>

                    </svg>
                </a>
                <!-- GitHub -->
                <a href="https://github.com/webglossdev" target="_blank" class="social-link" title="GitHub">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.138 20.198 22 16.44 22 12.017 22 6.484 17.522 2 12 2z" />
                    </svg>
                </a>
            </div>

            <!-- Music Player Widget -->
            <div class="music-player">
                <div class="player-info">
                    <div class="track-details">
                        <span class="track-name">Teeth</span>
                        <span class="track-artist">XXXTENTACION</span>
                    </div>
                    <div class="player-controls">
                        <button class="player-btn" id="prev-btn" title="Previous">
                            <svg viewBox="0 0 24 24">
                                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                            </svg>
                        </button>
                        <button class="player-btn play-pause-btn" id="play-btn" title="Play">
                            <svg id="play-icon" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                            <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;">
                                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                            </svg>
                        </button>
                        <button class="player-btn" id="next-btn" title="Next">
                            <svg viewBox="0 0 24 24">
                                <path d="M6 18l8.5-6L6 6zm9-12v12h2V6z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="progress-container">
                    <span class="time-label" id="current-time">0:00</span>
                    <div class="progress-slider-wrapper" id="progress-slider">
                        <div class="progress-bar-fill" id="progress-fill">
                            <div class="progress-handle"></div>
                        </div>
                    </div>
                    <span class="time-label" id="duration-time">0:00</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script>
        // DOM Elements
        const entryOverlay = document.getElementById('entry-overlay');
        const bgVideo = document.getElementById('bg-video');
        const playerAudio = document.getElementById('player-audio');

        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');

        const currentTimeLabel = document.getElementById('current-time');
        const durationTimeLabel = document.getElementById('duration-time');
        const progressSlider = document.getElementById('progress-slider');
        const progressFill = document.getElementById('progress-fill');

        const snowContainer = document.getElementById('snow-container');

        // Click to Enter Handler
        entryOverlay.addEventListener('click', () => {
            entryOverlay.classList.add('fade-out');

            // Start video
            bgVideo.play().catch(e => console.log("Video play failed:", e));

            // Start audio
            playerAudio.play().then(() => {
                updatePlayState(true);
            }).catch(e => {
                console.log("Audio autoplay failed, waiting for direct user action:", e);
                updatePlayState(false);
            });

            // Generate snowflakes
            startSnowing();
        });

        // Audio Player Controls
        playBtn.addEventListener('click', () => {
            if (playerAudio.paused) {
                playerAudio.play();
                updatePlayState(true);
            } else {
                playerAudio.pause();
                updatePlayState(false);
            }
        });

        playerAudio.addEventListener('loadedmetadata', () => {
            durationTimeLabel.textContent = formatTime(playerAudio.duration);
        });

        playerAudio.addEventListener('timeupdate', () => {
            const current = playerAudio.currentTime;
            const duration = playerAudio.duration || 0;

            currentTimeLabel.textContent = formatTime(current);
            if (duration > 0) {
                const percent = (current / duration) * 100;
                progressFill.style.width = percent + '%';
            }
        });

        playerAudio.addEventListener('ended', () => {
            playerAudio.currentTime = 0;
            playerAudio.play(); // Auto loop
        });

        // Seek functionality
        progressSlider.addEventListener('click', (e) => {
            const rect = progressSlider.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const percentage = clickX / width;

            if (playerAudio.duration) {
                playerAudio.currentTime = percentage * playerAudio.duration;
            }
        });

        // Drag to seek support
        let isDragging = false;
        progressSlider.addEventListener('mousedown', (e) => {
            isDragging = true;
            seek(e);
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) seek(e);
        });
        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function seek(e) {
            const rect = progressSlider.getBoundingClientRect();
            let clickX = e.clientX - rect.left;
            const width = rect.width;

            // Boundaries
            if (clickX < 0) clickX = 0;
            if (clickX > width) clickX = width;

            const percentage = clickX / width;
            if (playerAudio.duration) {
                playerAudio.currentTime = percentage * playerAudio.duration;
            }
        }

        // Helper: Format Time (mm:ss)
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        // Helper: Update Play/Pause Button State
        function updatePlayState(isPlaying) {
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        // Snow Particle System Generator
        function startSnowing() {
            const maxSnowflakes = 45;
            const symbols = ['❅', '❆', '❄'];

            for (let i = 0; i < maxSnowflakes; i++) {
                createSnowflake(symbols, true);
            }

            // Spawn new ones periodically
            setInterval(() => {
                const currentFlakes = snowContainer.querySelectorAll('.snowflake').length;
                if (currentFlakes < maxSnowflakes) {
                    createSnowflake(symbols, false);
                }
            }, 600);
        }

        function createSnowflake(symbols, initialSpawn = false) {
            const flake = document.createElement('div');
            flake.classList.add('snowflake');
            flake.textContent = symbols[Math.floor(Math.random() * symbols.length)];

            // Random properties
            const size = (Math.random() * 12 + 6) + 'px';
            const opacity = (Math.random() * 0.5 + 0.45);
            const left = Math.random() * 100 + '%';

            const fallDuration = (Math.random() * 8 + 6) + 's';
            const driftDuration = (Math.random() * 4 + 3) + 's';
            const delay = (initialSpawn ? -(Math.random() * 8) : 0) + 's';

            // Apply styles
            flake.style.fontSize = size;
            flake.style.opacity = opacity;
            flake.style.left = left;
            flake.style.top = initialSpawn ? (Math.random() * 100) + 'vh' : '-20px';

            flake.style.animation = `fall ${fallDuration} linear ${delay} infinite, drift ${driftDuration} ease-in-out ${delay} infinite`;

            snowContainer.appendChild(flake);
        }
    </script>
</body>
